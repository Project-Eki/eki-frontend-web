name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  #  Run tests first
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eki-web-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eki-web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run   # --run exits after tests complete (non-watch mode)

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test          # deployment is blocked if tests fail
    defaults:
      run:
        working-directory: eki-web-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eki-web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Clear old files on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: rm -rf /eki-frontend-web/*

      - name: Copy new build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "eki-web-app/dist/*"
          target: /eki-frontend-web/
          strip_components: 2